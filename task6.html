<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Tasks | Minimalist To-Do</title>
    <style>
        /* 1. CSS VARIABLES & RESET */
        :root {
            --primary-color: #6366f1;
            --primary-hover: #4f46e5;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --text-main: #1f2937;
            --text-muted: #9ca3af;
            --bg-card: #ffffff;
            --danger: #ef4444;
            --success: #10b981;
            --border-radius: 12px;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-gradient);
            padding: 20px;
        }

        /* 2. LAYOUT COMPONENTS */
        .todo-card {
            background: var(--bg-card);
            width: 100%;
            max-width: 450px;
            padding: 2rem;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            animation: slideUp 0.5s ease-out;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        h1 {
            font-size: 1.5rem;
            color: var(--text-main);
            font-weight: 700;
        }

        #task-counter {
            font-size: 0.875rem;
            background: #f3f4f6;
            padding: 4px 12px;
            border-radius: 20px;
            color: var(--primary-color);
            font-weight: 600;
        }

        /* 3. INPUT AREA */
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 1.5rem;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: var(--border-radius);
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: var(--primary-color);
        }

        button#add-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: var(--border-radius);
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s, transform 0.1s;
        }

        button#add-btn:hover {
            background: var(--primary-hover);
        }

        button#add-btn:active {
            transform: scale(0.95);
        }

        /* 4. TASK LIST & ITEMS */
        #task-list {
            list-style: none;
        }

        .task-item {
            display: flex;
            align-items: center;
            padding: 12px;
            background: #f9fafb;
            border-radius: 8px;
            margin-bottom: 10px;
            transition: all 0.3s ease;
            animation: fadeIn 0.3s ease;
        }

        .task-item:hover {
            transform: translateX(5px);
            background: #f3f4f6;
        }

        .task-checkbox {
            width: 20px;
            height: 20px;
            margin-right: 12px;
            cursor: pointer;
            accent-color: var(--success);
        }

        .task-text {
            flex: 1;
            font-size: 0.95rem;
            color: var(--text-main);
            transition: all 0.2s;
        }

        .task-item.completed .task-text {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        .delete-btn {
            background: transparent;
            color: var(--text-muted);
            border: none;
            cursor: pointer;
            padding: 5px;
            font-size: 1.2rem;
            transition: color 0.2s;
        }

        .delete-btn:hover {
            color: var(--danger);
        }

        /* 5. EMPTY STATE */
        .empty-state {
            text-align: center;
            color: var(--text-muted);
            padding: 20px 0;
            font-style: italic;
        }

        .hidden {
            display: none;
        }

        /* 6. ANIMATIONS */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .removing {
            opacity: 0;
            transform: scale(0.9);
        }

        /* Responsive adjustments */
        @media (max-width: 480px) {
            .todo-card {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <div class="todo-card">
        <header>
            <h1>My Tasks</h1>
            <span id="task-counter">0 Tasks</span>
        </header>

        <div class="input-group">
            <input type="text" id="task-input" placeholder="Add a new task..." maxlength="50">
            <button id="add-btn">Add</button>
        </div>

        <ul id="task-list">
            </ul>

        <div id="empty-msg" class="empty-state">
            No tasks yet. Start being productive!
        </div>
    </div>

    <script>
        /**
         * TODO APPLICATION LOGIC
         * Follows Clean Code & Modern Vanilla JS standards
         */

        // DOM Elements
        const taskInput = document.querySelector('#task-input');
        const addBtn = document.querySelector('#add-btn');
        const taskList = document.querySelector('#task-list');
        const taskCounter = document.querySelector('#task-counter');
        const emptyMsg = document.querySelector('#empty-msg');

        /**
         * Updates the counter and toggles the empty state message
         */
        function updateUI() {
            const totalTasks = taskList.querySelectorAll('.task-item').length;
            
            // Update Text
            taskCounter.textContent = `${totalTasks} Task${totalTasks !== 1 ? 's' : ''}`;

            // Toggle visibility of empty state
            if (totalTasks === 0) {
                emptyMsg.classList.remove('hidden');
            } else {
                emptyMsg.classList.add('hidden');
            }
        }

        /**
         * Creates a new task element and adds it to the DOM
         */
        function addTask() {
            const text = taskInput.value.trim();

            // Validation: Prevent empty tasks
            if (text === "") {
                taskInput.focus();
                return;
            }

            // Create Task Element
            const li = document.createElement('li');
            li.classList.add('task-item');

            // Securely set content using separate elements (Prevents XSS)
            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.classList.add('task-checkbox');

            const span = document.createElement('span');
            span.classList.add('task-text');
            span.textContent = text; // Secure way to inject user input

            const deleteBtn = document.createElement('button');
            deleteBtn.classList.add('delete-btn');
            deleteBtn.innerHTML = '&times;'; // Multiplication sign for "X"
            deleteBtn.title = 'Delete Task';

            // Assemble
            li.appendChild(checkbox);
            li.appendChild(span);
            li.appendChild(deleteBtn);

            // Add to List
            taskList.appendChild(li);

            // Reset Input
            taskInput.value = '';
            taskInput.focus();

            // Refresh UI
            updateUI();
        }

        /**
         * Event Delegation: Handles clicks on checkboxes and delete buttons
         */
        taskList.addEventListener('click', (event) => {
            const target = event.target;

            // Handle Checkbox (Complete)
            if (target.classList.contains('task-checkbox')) {
                const parent = target.closest('.task-item');
                parent.classList.toggle('completed');
            }

            // Handle Delete
            if (target.classList.contains('delete-btn')) {
                const parent = target.closest('.task-item');
                
                // Animation before removal
                parent.classList.add('removing');
                parent.addEventListener('transitionend', () => {
                    parent.remove();
                    updateUI();
                }, { once: true });
            }
        });

        // Event: Add button click
        addBtn.addEventListener('click', addTask);

        // Event: Keyboard "Enter" support
        taskInput.addEventListener('keydown', (event) => {
            if (event.key === 'Enter') {
                addTask();
            }
        });

        // Initialize UI on load
        updateUI();

    </script>
</body>
</html>
